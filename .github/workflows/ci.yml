name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:ci

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check

  test:
    name: Tests (${{ matrix.db-driver }}, ${{ matrix.storage-driver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db-driver: [postgres, mysql, sqlite]
        storage-driver: [filesystem, s3, gcs]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:run
        env:
          VITEST_DB_DRIVER: ${{ matrix.db-driver }}
          VITEST_STORAGE_DRIVER: ${{ matrix.storage-driver }}

  publish:
    name: Publish GHCR Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image version
        id: version
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.short_sha }}
          build-args: |
            BUILD_HASH=${{ steps.version.outputs.short_sha }}
